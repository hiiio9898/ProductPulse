# 生产部署完整编排（对应 部署文档 9.2）
# 含 app / celery / nginx，需先 build 镜像（backend/Dockerfile）
# 用法：docker compose up -d

services:
  postgres:
    image: postgres:15
    container_name: productpulse_postgres
    restart: always
    environment:
      POSTGRES_DB: productpulse
      POSTGRES_USER: productpulse
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productpulse -d productpulse"]
      interval: 30s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: productpulse_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: productpulse_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://productpulse:${DB_PASSWORD}@postgres:5432/productpulse
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SORFTIME_API_KEY=${SORFTIME_API_KEY}
      - ALI1688_APP_KEY=${ALI1688_APP_KEY}
      - ALI1688_APP_SECRET=${ALI1688_APP_SECRET}
      - GLM_API_KEY=${GLM_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  celery:
    build: ./backend
    container_name: productpulse_celery
    restart: always
    command: celery -A app.celery_app worker --beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://productpulse:${DB_PASSWORD}@postgres:5432/productpulse
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: productpulse_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./frontend/dist:/usr/share/nginx/html
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app

volumes:
  pg_data: